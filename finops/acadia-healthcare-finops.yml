principles:
  - name: Visibility
    description: There is no Acadia Healthcare API invoice. Visibility applies to internal IT spend on
      EHR, HL7/FHIR integration, and clearinghouse fees that support clinical operations.
  - name: Allocation
    description: Allocate IT and integration cost to facility, region, and service line (acute, specialty,
      RTC) rather than to API call volume.
  - name: Optimization
    description: Optimization is operational — payer-mix, length-of-stay, and integration consolidation —
      not API-level optimization.
  - name: Accountability
    description: Facility CFOs and the corporate revenue-cycle team own the operational cost lines; there
      is no external API consumer accountable for spend.
